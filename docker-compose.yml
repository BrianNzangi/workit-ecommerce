version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: workit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '##@Scottish!'
      POSTGRES_DB: workit-db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: workit-backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=5smbsqzmpdy1f464
      - S3_BUCKET=workit-bucket
      - S3_REGION=us-east-1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  studio:
    build:
      context: .
      dockerfile: Dockerfile.studio
    container_name: drizzle-studio
    ports:
      - "4983:4983"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: quay.io/minio/minio
    container_name: workit-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: 5smbsqzmpdy1f464
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
    name: workit-ecommerce_minio_data
