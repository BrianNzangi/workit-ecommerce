services:
  postgres:
    image: postgres:15-alpine
    container_name: workit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '##@Scottish!'
      POSTGRES_DB: workit-db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: workit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  typesense:
    image: typesense/typesense:27.1
    container_name: workit-typesense
    restart: unless-stopped
    ports:
      - "8108:8108"
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=workit-typesense-api-key
      - TYPESENSE_ENABLE_CORS=true
    volumes:
      - typesense_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    container_name: workit-backend
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:%23%23%40Scottish%21@postgres:5432/workit-db
      - REDIS_URL=redis://redis:6379
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_PROTOCOL=http
      - TYPESENSE_API_KEY=workit-typesense-api-key
      - TYPESENSE_PRODUCTS_COLLECTION=products
      - BETTER_AUTH_URL=http://localhost:3001
      - BACKEND_URL=http://localhost:3001
      - FRONTEND_URL=http://localhost:3000
      - ADMIN_URL=http://localhost:3002
      - BETTER_AUTH_TRUSTED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3002,http://127.0.0.1:3002
      - CORS_ORIGIN=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3002,http://127.0.0.1:3002
      - S3_BUCKET=workit
      - S3_REGION=auto
      - S3_FORCE_PATH_STYLE=false
      - S3_AUTO_CREATE_BUCKET=false
      - USE_DDD_ORDER_MANAGEMENT=true
      - USE_DDD_CATALOG=false
      - USE_DDD_CUSTOMER=true
      - USE_DDD_MARKETING=true
      - USE_DDD_FULFILLMENT=true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      typesense:
        condition: service_started
    volumes:
      - ./backend/src:/app/backend/src:cached
      - ./backend/uploads:/app/backend/uploads:cached
      - ./packages/db/src:/app/packages/db/src:cached
      - ./packages/validation/src:/app/packages/validation/src:cached

  studio:
    build:
      context: .
      dockerfile: Dockerfile.studio
    container_name: drizzle-studio
    command: ["node", "./scripts/studio.mjs"]
    ports:
      - "4983:4983"
    environment:
      - DATABASE_URL=postgresql://postgres:%23%23%40Scottish%21@postgres:5432/workit-db
      - DRIZZLE_SCHEMA_PATH=./dist/schema/*.js
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  typesense_data:
