version: "3.8"

services:
  grafana:
    image: grafana/grafana-enterprise:12.4
    container_name: workit-grafana
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: yourpassword
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-storage:/var/lib/grafana
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.workit.co.ke`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    container_name: workit-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  node_exporter:
    image: prom/node-exporter:latest
    container_name: workit-node-exporter
    restart: unless-stopped
    network_mode: host
    pid: "host"

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: workit-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://default:s685qNcoCXXEiEs5pxPp@workit-ecommerce-workit-caching-hzocru:6379
    ports:
      - "9121:9121"
    labels:
      - "traefik.enable=false"

volumes:
  grafana-storage: {}
