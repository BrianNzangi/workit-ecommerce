name: Refresh ads.txt

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch ads.txt
        working-directory: frontend
        run: node scripts/fetch-ads.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "workit-bot"
          git config user.email "bot@workit.co.ke"
          git add frontend/public/ads.txt
          if git diff --cached --quiet; then
            echo "No changes to ads.txt"
          else
            git commit -m "chore: refresh ads.txt [skip ci]"
            git push
          fi
