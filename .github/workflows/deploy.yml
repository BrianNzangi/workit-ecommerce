name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

env:
  REGISTRY: ghcr.io
  # Matches the path: ghcr.io/briannzangi/workit-ecommerce
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/workit-ecommerce

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: Dockerfile.backend
          - service: frontend
            dockerfile: Dockerfile.frontend
          - service: admin
            dockerfile: Dockerfile.admin
          - service: studio
            dockerfile: Dockerfile.studio

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Log in first
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. REQUIRED: This creates the special 'buildkit' builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Extract Metadata
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      # 4. Now Build and Push (Cache will work now)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy Redeploy
        # Ensure you have added these secrets in GitHub Repo Settings > Secrets > Actions
        env:
          DOKPLOY_BACKEND_WEBHOOK: ${{ secrets.DOKPLOY_BACKEND_WEBHOOK }}
          DOKPLOY_FRONTEND_WEBHOOK: ${{ secrets.DOKPLOY_FRONTEND_WEBHOOK }}
          DOKPLOY_ADMIN_WEBHOOK: ${{ secrets.DOKPLOY_ADMIN_WEBHOOK }}
          DOKPLOY_STUDIO_WEBHOOK: ${{ secrets.DOKPLOY_STUDIO_WEBHOOK }}
        run: |
          curl -X POST "$DOKPLOY_BACKEND_WEBHOOK"
          curl -X POST "$DOKPLOY_FRONTEND_WEBHOOK"
          curl -X POST "$DOKPLOY_ADMIN_WEBHOOK"
          curl -X POST "$DOKPLOY_STUDIO_WEBHOOK"
