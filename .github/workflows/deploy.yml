name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm --filter @workit/db build && pnpm --filter @workit/validation build

      - name: Test backend (unit)
        working-directory: backend
        run: npx vitest --run tests/unit

      - name: Test admin
        working-directory: admin
        run: npx vitest --run

      - name: Build all
        run: pnpm build
