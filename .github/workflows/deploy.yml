name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/workit-ecommerce

jobs:
  # 1. DETECT WHICH FILES CHANGED
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'packages/**'
              - 'Dockerfile.backend'
            frontend:
              - 'frontend/**'
              - 'packages/**'
              - 'Dockerfile.frontend'
            admin:
              - 'admin/**'
              - 'packages/**'
              - 'Dockerfile.admin'
            studio:
              - 'packages/db/**'
              - 'Dockerfile.studio'

  # 2. BUILD ONLY THE SERVICES THAT CHANGED
  build-and-push:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Fixes Next.js "DATABASE_URL not defined" crash during build
          build-args: |
            DATABASE_URL=postgres://dummy:dummy@localhost:5432/dummy
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. SMART DEPLOY (Only pings Dokploy for changed services)
  deploy:
    needs: [detect-changes, build-and-push]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Trigger Dokploy Redeploy
        run: |
          case "${{ matrix.service }}" in
            "backend") curl -X POST "${{ secrets.DOKPLOY_BACKEND_WEBHOOK }}" ;;
            "frontend") curl -X POST "${{ secrets.DOKPLOY_FRONTEND_WEBHOOK }}" ;;
            "admin") curl -X POST "${{ secrets.DOKPLOY_ADMIN_WEBHOOK }}" ;;
            "studio") curl -X POST "${{ secrets.DOKPLOY_STUDIO_WEBHOOK }}" ;;
          esac
